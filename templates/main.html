<!DOCTYPE html>
<html>
<head>
    <title>RPi Web Server</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap-theme.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>RPi Web Server</h1>
        {% for pin in pins %}
            <h2>{{ pins[pin].name }}
            {% if pins[pin].state == true %}
                is currently <strong>on</strong></h2>
                <div class="row">
                    <div class="col-md-2">
                        <a href="/{{ pin }}/off" class="btn btn-block btn-lg btn-default" role="button">Turn off</a>
                    </div>
                </div>
            {% else %}
                is currently <strong>off</strong></h2>
                <div class="row">
                    <div class="col-md-2">
                        <a href="/{{ pin }}/on" class="btn btn-block btn-lg btn-primary" role="button">Turn on</a>
                    </div>
                </div>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
